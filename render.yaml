services:
  - type: web
    name: abovedeck-web-service
    runtime: python
    rootDir: api
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://dashkim.github.io
